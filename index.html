<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarCo App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* 1. Force the page background to match your Dark Mode app */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #0e1117; /* Match Streamlit's default Dark background */
        }
    
        /* 2. Ensure the iframe is truly fullscreen with no gaps */
        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>
    <iframe src="https://carco-co2-emission.streamlit.app/?embed=true"></iframe>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
